services:
  postgis:
    image: postgis/postgis:16-3.4-alpine
    container_name: cellcover-db
    environment:
      POSTGRES_DB: cellcover
      POSTGRES_USER: cellcover
      POSTGRES_PASSWORD: cellcover
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cellcover -d cellcover"]
      interval: 5s
      timeout: 5s
      retries: 5

  pg-tileserv:
    image: ghcr.io/crunchydata/pg_tileserv:latest
    container_name: cellcover-tileserv
    environment:
      DATABASE_URL: postgresql://cellcover:cellcover@postgis:5432/cellcover
    ports:
      - "7800:7800"
    depends_on:
      postgis:
        condition: service_healthy

volumes:
  pgdata:
